<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block naslov %}BioNaloga{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #222;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a5c2a;
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        main {
            flex: 1;
            overflow: hidden;
            display: flex;
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <header>BioNaloga — Sestavljanje testov</header>
    <main>
        {% block vsebina %}{% endblock %}
    </main>
    {% block extra_script %}{% endblock %}
</body>
</html>
